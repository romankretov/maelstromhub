[project]
name = "maelstromhub-core"
version = "0.1.0"
description = "Shared domain models for Maelstromhub."
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.8,<3.0"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["maelstromhub_core"]
