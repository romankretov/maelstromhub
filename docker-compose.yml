services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: maelstrom
      POSTGRES_USER: maelstrom
      POSTGRES_PASSWORD: maelstrom
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maelstrom -d maelstrom"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      HTTP_ADDR: ":8080"
      HYPERLIQUID_BASE_URL: https://api.hyperliquid.xyz
      POSTGRES_DSN: postgres://maelstrom:maelstrom@postgres:5432/maelstrom?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      MIGRATIONS_DIR: /app/backend/migrations
      RATE_LIMIT_WEIGHT_PER_MINUTE: "1200"
      ENDPOINT_WEIGHTS: metaAndAssetCtxs=20,allMids=2,candleSnapshot=20,l2Book=2,recentTrades=20,fundingHistory=20
      TIER1_META_INTERVAL_SECONDS: "45"
      TIER1_MIDS_INTERVAL_SECONDS: "20"
      CANDLE_INTERVALS: 1m,5m,15m,1h
      CANDLE_BACKFILL_DAYS: "14"
      SHORTLIST_SIZE: "20"
      L2BOOK_INTERVAL_SECONDS: "60"
      RECENT_TRADES_INTERVAL_SECONDS: "60"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      API_INTERNAL_URL: http://backend:8080
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  redis-data:
